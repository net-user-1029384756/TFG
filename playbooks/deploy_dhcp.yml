---
- name: Desplegar servidor DHCP en Linux (Debian/Ubuntu)
  hosts: dhcp_servers
  become: true
  gather_facts: true

  vars:
    dhcp_package: isc-dhcp-server
    dhcp_service: isc-dhcp-server
    dhcp_config_path: /etc/dhcp/dhcpd.conf

  tasks:
    - name: Instalar paquete del servidor DHCP
      ansible.builtin.apt:
        name: "{{ dhcp_package }}"
        state: present
        update_cache: true

    - name: Plantilla de configuración principal de DHCP (dhcpd.conf)
      ansible.builtin.template:
        src: dhcpd.conf.j2
        dest: "{{ dhcp_config_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Reiniciar servicio DHCP

    - name: Asegurar que el servicio DHCP está habilitado y arrancado
      ansible.builtin.service:
        name: "{{ dhcp_service }}"
        state: started
        enabled: true

  handlers:
    - name: Reiniciar servicio DHCP
      ansible.builtin.service:
        name: "{{ dhcp_service }}"
        state: restarted

